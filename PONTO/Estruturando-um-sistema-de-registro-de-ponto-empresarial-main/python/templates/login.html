<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.box {
    background: rgba(30, 41, 59, 0.95);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 15px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 30px rgba(143, 18, 122, 0.4);
}

h2 {
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px 0 12px 10px;
    margin: 5px -5px 20px -5px;
    border-radius: 5px;
    border: none;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #3b82f6;
    color: white;
    font-weight: bold;
    cursor: center;
}

button:hover {
    background: #2563eb;
}

/* LINKS */
.links {
    margin-top: 15px;
    font-size: 14px;
}

.links a {
    color: #60a5fa;
    text-decoration: none;
}

.links a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔐 Sistema de Ponto</h2>

    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuario" value="{{ usuario | default('') }}" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

    <div class="links">
        <a href="/recuperar">Esqueci minha senha</a><br>
        <a href="/cadastro">Cadastre-se</a>
    </div>

    {% if erro %}
        <p style="color:#f87171;">{{ erro }}</p>
    {% endif %}
</div>

</body>
</html>
