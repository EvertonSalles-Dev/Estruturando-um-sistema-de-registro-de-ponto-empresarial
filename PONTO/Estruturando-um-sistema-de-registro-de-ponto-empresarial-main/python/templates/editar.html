<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Registro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #f3f3f57a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    background: rgba(30, 41, 59, 0.95);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 15px;
    width: 90%;
    max-width: 420px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* TITULO */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INFO FUNCIONARIO */
.info {
    background: #0f172a;
    padding: 5px;
    border-radius: 110px;
    margin-bottom: 10px;
    text-align: center;
    font-size: 15px;
}

/* INPUTS */
label {
    font-size: 14px;
    display: block;
    margin-top: -5px 10px 5px 0;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BOTÕES */
.botoes {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

/* CORES */
.salvar {
    background: #22c55e;
    color: white;
}

.cancelar {
    background: #ef4444;
    color: white;
}

/* HOVER */
button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

    <h2>✏️ Editar Registro</h2>

    <!-- INFO -->
    <div class="info">
        <strong>{{ registro[1] }}</strong><br>
        Tipo: {{ registro[2] }}
    </div>
<div>
    <p><strong>Registro:</strong> {{ registro[1] }}</p>
    
</div>
    <form method="POST">

        <label>📅 Data</label>
        <input type="date" name="data" value="{{ registro[4] }}" required>

        <label>⏱ Hora</label>
        <input type="time" name="hora" value="{{ registro[3] }}" required>

        <div class="botoes">
            <button type="submit" class="salvar">Salvar</button>
            <a href="/admin">
                <button type="button" class="cancelar">Cancelar</button>
            </a>
        </div>

    </form>

</div>

</body>
</html>
