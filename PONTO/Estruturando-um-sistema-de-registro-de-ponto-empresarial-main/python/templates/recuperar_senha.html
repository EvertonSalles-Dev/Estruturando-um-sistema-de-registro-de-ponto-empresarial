<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha</title>
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
        }

        .card {
            background-color: #fff;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 1s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity:1; transform: translateY(0); }
            from { opacity:0; transform: translateY(20px); }
        }

        h1 {
            text-align: center;
            color: #111827;
            margin-bottom: 30px;
            font-size: 28px;
        }

        form { display: flex; flex-direction: column; gap: 20px; }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #4f46e5;
            outline: none;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.2);
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 16px;
        }

        button {
            padding: 12px;
            background: linear-gradient(90deg, #4f46e5, #3b82f6);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(90deg, #3b82f6, #6366f1);
        }

        .flash {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            animation: flashFade 1s ease forwards;
        }

        @keyframes flashFade {
            0% { opacity:0; transform: translateY(-10px); }
            100% { opacity:1; transform: translateY(0); }
        }

        .success { background-color: #d1fae5; color: #065f46; }
        .danger { background-color: #fee2e2; color: #991b1b; }

        a.back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #4f46e5;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        a.back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1><i class="fas fa-key"></i> Recuperar Senha</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="flash {{ category }}">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <input type="email" name="email" placeholder="Digite seu email" required>
                <i class="fas fa-envelope"></i>
            </div>
            <button type="submit"><i class="fas fa-paper-plane"></i> Enviar Link</button>
        </form>

        <a class="back" href="{{ url_for('login') }}">Voltar para o login</a>
    </div>
</body>
</html>
