<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Ponto</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.box {
    background: rgba(30, 41, 59, 0.95);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* FOTO */
.foto {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #3b82f6;
    margin-bottom: 10px;
}

/* TEXTOS */
h2 {
    margin: 10px 0;
}

#hora {
    font-size: 18px;
    color: #38bdf8;
    margin: 10px 0;
}

.ultimo {
    font-size: 14px;
    color: #cbd5f5;
    margin-bottom: 20px;
}

/* BOTÕES */
.botoes {
    display: initial;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.entrada {
    background: #22c55e;
    color: white;
}

.saida {
    background: #ef4444;
    color: white;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
</style>

</head>
<body>

<div class="box">

    <!-- FOTO -->
   <img src="{{ url_for('static', filename='perfil/fotos/' + (usuario.foto if usuario.foto else 'default.png')) }}" class="foto">

    <!-- NOME -->
    <h2>{{ usuario.nome }}</h2>

    <!-- HORA -->
    <p id="hora"></p>

    <!-- ÚLTIMO REGISTRO -->
    <p class="ultimo">
        Último registro: {{ ultimo_registro }}
    </p>

    <!-- BOTÕES -->
    <div class="botoes">
        <a href="/registrar/entrada">
            <button class="entrada">Entrada</button>
        </a>

        <a href="/registrar/saida">
            <button class="saida">Saída</button>
        </a>
    </div>

</div>

<!-- SCRIPT HORA -->
<script>
setInterval(() => {
    const agora = new Date();
    document.getElementById("hora").innerText =
        agora.toLocaleTimeString();
}, 1000);

</script>

</body>
</html>
